[build]
  publish = "."
  command = ""

# SPA fallback — unknown paths serve index.html
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# Service worker: never cached (must always be fresh)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# HTML files: always fresh
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Static assets: cached for 1 day
[[headers]]
  for = "/cards-config.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/icon.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
